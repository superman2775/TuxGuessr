<html lang="en">

  <meta charset="UTF-8" />
  <title>TuxGuessr – stable Mapillary embed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link

  <link rel="icon" href="data:," />

  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#111; color:#eee; }
    header { padding:10px 16px; background:#181818; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; }
    #container { display:flex; flex-direction:column; height:calc(100vh - 52px); }
    #top { flex:1; position:relative; }
    #embed-container { width:100%; height:100%; }
    #embed-container iframe { width:100%; height:100%; border:0; }
    #hint { position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:4px; font-size:13px; }
    #bottom { height:40vh; display:flex; border-top:1px solid #333; }
    #map { flex:1; }
    #sidebar { width:260px; background:#181818; border-left:1px solid #333; padding:10px; box-sizing:border-box; font-size:14px; }
    button { background:#2f7dff; border:none; color:#fff; padding:6px 10px; border-radius:4px; cursor:pointer; font-size:14px; }
    button:disabled { opacity:0.5; cursor:default; }
    .btn-row { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .stat { margin-top:6px; }
  </style>
</head>
<body>
<header>
  <div><strong>TuxGuessr</strong></div>
  <div>Score: <span id="score">0</span> | Round: <span id="round">0</span>/5</div>
</header>

<div id="container">
  <div id="top">
    <div id="embed-container"></div>
  </div>
  <div id="bottom">
    <div id="map"></div>
    <div id="sidebar">
      <div><strong>How to play</strong></div>
      <div class="stat">A random view is shown.</div>
      <div class="stat">Click on the map where you think the camera is.</div>
      <div class="stat" id="last-result">No guess yet.</div>
      <div class="stat" id="place-name"></div>
      <div class="stat" id="round-score"></div>
      <div class="btn-row">
        <button id="guess-btn" disabled>Make guess</button>
        <button id="next-btn" disabled>Next round</button>
        <button id="reset-btn">Restart</button>
      </div>
    </div>
  </div>
</div>

// -------- parsing helpers: URL -> {iframeHtml, lat, lon, key} --------

// Mapillary’s docs: https://www.mapillary.com/embed?image_key=IMAGE_ID&style=photo [web:46]
function parseMapillaryUrl(url) {
  try {
    const u = new URL(url);
    const lat = parseFloat(u.searchParams.get("lat"));
    const lon = parseFloat(u.searchParams.get("lng"));
    const pKey = u.searchParams.get("pKey"); // image key / ID

    if (!pKey || Number.isNaN(lat) || Number.isNaN(lon)) {
      return null;
    }

    const embedSrc = `https://www.mapillary.com/embed?image_key=${encodeURIComponent(pKey)}&style=photo`;
    const iframeHtml = `<iframe src="${embedSrc}" allowfullscreen loading="lazy"></iframe>`;

    return { iframeHtml, lat, lon, key: pKey };
  } catch (e) {
    return null;
  }
}

// Pre‑parse all URLs
const LOCATIONS = MAPILLARY_URLS.map(parseMapillaryUrl).filter(Boolean);

if (LOCATIONS.length === 0) {
  console.warn("No valid Mapillary URLs parsed. Add some to MAPILLARY_URLS.");
}

// ---------------- core game state ----------------
let currentIndex = null;
let currentRound = 0;
let totalScore = 0;
let guessLatLng = null;
let trueMarker = null;
let guessMarker = null;
let lineLayer = null;

const scoreEl = document.getElementById("score");
const roundEl = document.getElementById("round");
const lastResultEl = document.getElementById("last-result");
const placeNameEl = document.getElementById("place-name");
const roundScoreEl = document.getElementById("round-score");
const guessBtn = document.getElementById("guess-btn");
const nextBtn = document.getElementById("next-btn");
const resetBtn = document.getElementById("reset-btn");
const embedContainer = document.getElementById("embed-container");

// Leaflet map centered roughly on Tux [web:32][web:40]
const map = L.map("map").setView([47.1355, 11.6939], 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

// Map clicks for guess
map.on("click", (e) => {
  if (currentIndex === null || nextBtn.disabled === false) return;
  guessLatLng = e.latlng;
  if (guessMarker) map.removeLayer(guessMarker);
  guessMarker = L.marker(guessLatLng, { title: "Your guess" }).addTo(map);
  guessBtn.disabled = false;
});

// Haversine distance (km)
function distanceKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI/180;
  const dLon = (b.lon - a.lon) * Math.PI/180;
  const lat1 = a.lat * Math.PI/180;
  const lat2 = b.lat * Math.PI/180;
  const sinDLat = Math.sin(dLat/2);
  const sinDLon = Math.sin(dLon/2);
  const c = 2 * Math.atan2(
    Math.sqrt(sinDLat*sinDLat + Math.cos(lat1)*Math.cos(lat2)*sinDLon*sinDLon),
    Math.sqrt(1 - sinDLat*sinDLat - Math.cos(lat1)*Math.cos(lat2)*sinDLon*sinDLon)
  );
  return R * c;
}

// Reverse geocoding via Nominatim [web:29]
async function fetchPlaceName(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=14&addressdetails=1`;
    const res = await fetch(url, {
      headers: { "User-Agent": "TuxGuessr (educational project)" }
    });
    const data = await res.json();
    return data.display_name || "Somewhere near Tux";
  } catch (e) {
    return "Somewhere near Tux";
  }
}

// Pick random index
function randomLocationIndex() {
  return Math.floor(Math.random() * LOCATIONS.length);
}

async function startRound() {
  if (LOCATIONS.length === 0) {
    lastResultEl.textContent = "No valid Mapillary URLs configured.";
    return;
  }

  if (currentRound >= TOTAL_ROUNDS) {
    lastResultEl.textContent = `Game over! Final score: ${Math.round(totalScore)} pts.`;
    roundScoreEl.textContent = "";
    guessBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  currentRound++;
  roundEl.textContent = currentRound;

  if (trueMarker) map.removeLayer(trueMarker);
  if (guessMarker) map.removeLayer(guessMarker);
  if (lineLayer) map.removeLayer(lineLayer);
  trueMarker = null; guessMarker = null; lineLayer = null;
  guessLatLng = null;

  lastResultEl.textContent = "Loading Mapillary view…";
  placeNameEl.textContent = "";
  roundScoreEl.textContent = "";
  guessBtn.disabled = true;
  nextBtn.disabled = true;
  map.setView([47.1355, 11.6939], 12);

  currentIndex = randomLocationIndex();
  const loc = LOCATIONS[currentIndex];

  embedContainer.innerHTML = loc.iframeHtml;
  lastResultEl.textContent = "Click on the map to place your guess.";
}

// Make guess
guessBtn.addEventListener("click", async () => {
  if (currentIndex === null || !guessLatLng) return;

  const loc = LOCATIONS[currentIndex];
  if (!loc) {
    lastResultEl.textContent = "No data for this location.";
    guessBtn.disabled = true;
    nextBtn.disabled = false;
    return;
  }

  const { lat, lon } = loc;
  const trueLatLng = { lat, lon };

  trueMarker = L.marker([lat, lon], { title: "Actual location" }).addTo(map);

  lineLayer = L.polyline([[guessLatLng.lat, guessLatLng.lng], [lat, lon]], {
    color: "yellow"
  }).addTo(map);
  map.fitBounds(lineLayer.getBounds(), { padding: [20, 20] });

  const dist = distanceKm(
    { lat: guessLatLng.lat, lon: guessLatLng.lng },
    trueLatLng
  );
  let roundScore = Math.max(0, 5000 - 400 * dist);
  totalScore += roundScore;
  scoreEl.textContent = Math.round(totalScore);

  lastResultEl.textContent = `You were ${dist.toFixed(2)} km away.`;
  roundScoreEl.textContent = `Round score: ${Math.round(roundScore)} pts.`;

  const placeName = await fetchPlaceName(lat, lon);
  placeNameEl.textContent = `Actual location: ${placeName}`;

  guessBtn.disabled = true;
  nextBtn.disabled = false;
});

// Next round
nextBtn.addEventListener("click", () => startRound());

// Reset
resetBtn.addEventListener("click", () => {
  currentRound = 0;
  totalScore = 0;
  scoreEl.textContent = "0";
  roundEl.textContent = "0";
  lastResultEl.textContent = "Game reset. Click Next round to start.";
  placeNameEl.textContent = "";
  roundScoreEl.textContent = "";
  guessBtn.disabled = true;
  nextBtn.disabled = false;
});

// Start first round
nextBtn.disabled = false;
startRound();
</script>
